<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>페이지 이동 중</title>
    <script>
      (function() {
        const path = window.location.pathname;

        const candidates = [
          "/movingtocelina",
          "/movingtocelina/",
          "/Texas%20moving",
          "/Texas%20moving/",
          "/Texas moving",
          "/Texas moving/"
        ];

        const fallback = (() => {
          for (const candidate of candidates) {
            if (path === candidate || path === `${candidate}/` || path.startsWith(`${candidate}/`) || path.startsWith(`${candidate}/index.html`)) {
              return candidate.endsWith("/") ? candidate : `${candidate}/`;
            }
          }
          return "/";
        })();

        if (path === fallback || path === `${fallback}index.html`) {
          window.location.replace(fallback);
          return;
        }

        if (candidates.some((candidate) =>
          path.startsWith(`${candidate}/`) ||
          path === candidate ||
          candidate === "/movingtocelina" && path.startsWith("/movingtocelina")
        )) {
          window.location.replace(fallback);
          return;
        }

        // For any other invalid path (including custom-domain root paths),
        // send users to site root.
        window.location.replace(`${fallback}#`);
      })();
    </script>
  </head>
  <body>
    <p>요청한 페이지를 찾을 수 없어 시작 화면으로 이동합니다.</p>
  </body>
</html>
