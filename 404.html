<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>페이지 이동 중</title>
    <script>
      (function() {
        const path = window.location.pathname;
        const hasRepoPrefix = path.indexOf('/movingtocelina/') === 0 || path === '/movingtocelina';
        const fallback = hasRepoPrefix ? '/movingtocelina/' : '/';

        if (path !== fallback && path !== `${fallback}index.html`) {
          window.location.replace(`${window.location.origin}${fallback}`);
        }
      })();
    </script>
  </head>
  <body>
    <p>요청한 페이지를 찾을 수 없어 시작 화면으로 이동합니다.</p>
  </body>
</html>
